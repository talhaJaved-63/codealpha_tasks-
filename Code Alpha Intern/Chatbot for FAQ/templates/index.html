<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .chat-container { width: 420px; height: 650px; background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #4f46e5; color: #fff; padding: 18px 20px; font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .chat-header .dot { width: 10px; height: 10px; background: #34d399; border-radius: 50%; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .message.bot { align-self: flex-start; background: #e8eaff; color: #1e1b4b; border-bottom-left-radius: 4px; }
        .message.user { align-self: flex-end; background: #4f46e5; color: #fff; border-bottom-right-radius: 4px; }
        .message .confidence { font-size: 11px; color: #9ca3af; margin-top: 4px; }
        .chat-input { display: flex; padding: 12px; border-top: 1px solid #e5e7eb; gap: 8px; }
        .chat-input input { flex: 1; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 24px; font-size: 14px; outline: none; transition: border 0.2s; }
        .chat-input input:focus { border-color: #4f46e5; }
        .chat-input button { background: #4f46e5; color: #fff; border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .chat-input button:hover { background: #4338ca; }
        .suggestions { padding: 0 16px 8px; display: flex; flex-wrap: wrap; gap: 6px; }
        .suggestions button { background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 16px; padding: 6px 12px; font-size: 12px; cursor: pointer; color: #4f46e5; transition: all 0.2s; }
        .suggestions button:hover { background: #4f46e5; color: #fff; border-color: #4f46e5; }
        .typing { display: none; align-self: flex-start; padding: 12px 16px; background: #e8eaff; border-radius: 16px; border-bottom-left-radius: 4px; }
        .typing span { display: inline-block; width: 8px; height: 8px; background: #9ca3af; border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="dot"></div>
            FAQ Chatbot
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">Hello! I'm your FAQ assistant. Ask me anything about our services.</div>
        </div>
        <div class="suggestions" id="suggestions">
            <button onclick="askSuggestion(this)">Business hours</button>
            <button onclick="askSuggestion(this)">Reset password</button>
            <button onclick="askSuggestion(this)">Return policy</button>
            <button onclick="askSuggestion(this)">Shipping</button>
        </div>
        <div class="typing" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type your question..." autocomplete="off">
            <button id="sendBtn">&#10148;</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        function addMessage(text, sender, confidence) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = text;
            if (confidence !== undefined && confidence !== null) {
                const confDiv = document.createElement('div');
                confDiv.className = 'confidence';
                confDiv.textContent = `Match confidence: ${(confidence * 100).toFixed(1)}%`;
                div.appendChild(confDiv);
            }
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const msg = userInput.value.trim();
            if (!msg) return;
            addMessage(msg, 'user');
            userInput.value = '';
            typingIndicator.style.display = 'flex';
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                typingIndicator.style.display = 'none';
                addMessage(data.answer, 'bot', data.confidence);
            } catch {
                typingIndicator.style.display = 'none';
                addMessage('Sorry, something went wrong. Please try again.', 'bot');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

        function askSuggestion(btn) {
            userInput.value = btn.textContent;
            sendMessage();
        }
    </script>
</body>
</html>
