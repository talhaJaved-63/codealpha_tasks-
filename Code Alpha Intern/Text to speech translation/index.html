<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Translation Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Language Translation Tool</h1>
            <p class="subtitle">Translate text between multiple languages</p>
        </header>

        <main>
            <div class="language-selector">
                <div class="lang-group">
                    <label for="sourceLang">From:</label>
                    <select id="sourceLang">
                        <option value="auto">Auto Detect</option>
                        <option value="en">English</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="pt">Portuguese</option>
                        <option value="ru">Russian</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="zh">Chinese</option>
                        <option value="ar">Arabic</option>
                        <option value="hi">Hindi</option>
                        <option value="nl">Dutch</option>
                        <option value="sv">Swedish</option>
                        <option value="pl">Polish</option>
                        <option value="tr">Turkish</option>
                        <option value="vi">Vietnamese</option>
                        <option value="th">Thai</option>
                        <option value="uk">Ukrainian</option>
                    </select>
                </div>

                <button id="swapBtn" class="swap-btn" title="Swap languages">
                    ⇄
                </button>

                <div class="lang-group">
                    <label for="targetLang">To:</label>
                    <select id="targetLang">
                        <option value="en">English</option>
                        <option value="es" selected>Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="pt">Portuguese</option>
                        <option value="ru">Russian</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="zh">Chinese</option>
                        <option value="ar">Arabic</option>
                        <option value="hi">Hindi</option>
                        <option value="nl">Dutch</option>
                        <option value="sv">Swedish</option>
                        <option value="pl">Polish</option>
                        <option value="tr">Turkish</option>
                        <option value="vi">Vietnamese</option>
                        <option value="th">Thai</option>
                        <option value="uk">Ukrainian</option>
                    </select>
                </div>
            </div>

            <div class="translation-area">
                <div class="input-section">
                    <div class="section-header">
                        <h3>Input Text</h3>
                        <span id="charCount">0 / 500</span>
                    </div>
                    <textarea id="inputText" placeholder="Enter text to translate..." maxlength="5000"></textarea>
                    <div class="input-actions">
                        <button id="clearBtn" class="action-btn" title="Clear text">Clear</button>
                    </div>
                </div>

                <div class="output-section">
                    <div class="section-header">
                        <h3>Translation</h3>
                    </div>
                    <div id="outputText" class="output-text">Translation will appear here...</div>
                    <div class="output-actions">
                        <button id="copyBtn" class="action-btn" title="Copy translation">Copy</button>
                        <button id="speakBtn" class="action-btn" title="Listen to translation">🔊 Speak</button>
                    </div>
                </div>
            </div>

            <button id="translateBtn" class="translate-btn">Translate</button>

            <div id="status" class="status"></div>
        </main>

        <footer>
            <p>Powered by MyMemory Translation API</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
